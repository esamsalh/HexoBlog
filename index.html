
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToolRar - كل أدوات الويب التي تحتاجها</title>
<meta name="description" content="منصة ToolRar المجانية تقدم مجموعة متنوعة من أدوات الويب: أدوات النصوص، أدوات المطورين، أدوات الصور، أدوات PDF، أدوات SEO والمزيد.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; }
  body {
    font-family: 'Cairo', system-ui, -apple-system, sans-serif;
    color: #e2e8f0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HERO - نفس تدرج موقع ToolRar */
  .hero {
    position: relative;
    min-height: 100vh;
    width: 100%;
    background: linear-gradient(to left, #1E3A8A, #080C1A);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    overflow: hidden;
  }

  /* توهجات خفيفة بنفس ألوان الموقع */
  .hero::before {
    content: "";
    position: absolute;
    top: -10%; right: -10%;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(99,102,241,0.25), rgba(99,102,241,0.05) 60%, transparent 70%);
    border-radius: 50%;
    filter: blur(20px);
    pointer-events: none;
  }
  .hero::after {
    content: "";
    position: absolute;
    bottom: -10%; left: -10%;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(16,185,129,0.15), rgba(59,130,246,0.08) 60%, transparent 70%);
    border-radius: 50%;
    filter: blur(20px);
    pointer-events: none;
  }

  /* اسم الموقع - أعلى الهيرو */
  .site-name {
    position: relative;
    z-index: 2;
    font-size: clamp(48px, 9vw, 110px);
    font-weight: 900;
    letter-spacing: -1px;
    text-align: center;
    margin-bottom: 12px;
    background: linear-gradient(90deg, #6366F1, #A5B4FC, #818CF8, #6366F1);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    background-size: 200% auto;
    animation: shine 4s linear infinite;
  }
  .site-tagline {
    position: relative;
    z-index: 2;
    font-size: clamp(14px, 2vw, 20px);
    color: #cbd5e1;
    text-align: center;
    margin-bottom: 56px;
    font-weight: 600;
  }
  @keyframes shine {
    to { background-position: 200% center; }
  }

  /* شبكة الروابط - يمين ويسار */
  .links-wrap {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    width: 100%;
    max-width: 1100px;
  }

  .col {
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: 16px;
    padding: 24px;
    backdrop-filter: blur(6px);
  }
  .col-title {
    font-size: 14px;
    color: #A5B4FC;
    font-weight: 700;
    margin-bottom: 6px;
    text-transform: none;
    border-bottom: 1px solid rgba(99,102,241,0.25);
    padding-bottom: 10px;
  }

  .col a {
    display: block;
    color: #e2e8f0;
    text-decoration: none;
    font-size: clamp(15px, 1.6vw, 19px);
    font-weight: 600;
    padding: 10px 14px;
    border-radius: 10px;
    transition: all 0.25s ease;
    background: rgba(99,102,241,0.05);
    border: 1px solid transparent;
  }
  .col a:hover {
    background: rgba(99,102,241,0.18);
    border-color: rgba(99,102,241,0.5);
    color: #ffffff;
    transform: translateX(-4px);
  }

  /* شريط سفلي صغير */
  .footer-line {
    position: relative;
    z-index: 2;
    margin-top: 50px;
    font-size: 13px;
    color: #94a3b8;
    text-align: center;
  }
  .footer-line a {
    color: #A5B4FC;
    text-decoration: none;
  }

  /* موبايل */
  @media (max-width: 720px) {
    .links-wrap { grid-template-columns: 1fr; gap: 24px; }
    .site-name { font-size: 56px; }
    .col { padding: 18px; }
  }
</style>
</head>
<body>
  <section class="hero">

    <!-- اسم الموقع أعلى الهيرو -->
    <h1 class="site-name">ToolRar</h1>
    <p class="site-tagline">كل أدوات الويب التي تحتاجها - سريعة وآمنة 100%</p>

    <!-- الروابط: يمين ويسار -->
    <div class="links-wrap">

      <!-- العمود الأيمن: روابط التنقل الرئيسية -->
      <div class="col">
        <div class="col-title">روابط رئيسية</div>
        <a href="https://www.toolrar.com/" rel="dofollow">الرئيسية</a>
        <a href="https://www.toolrar.com/all-tools" rel="dofollow">جميع الأدوات</a>
        <a href="https://www.toolrar.com/sitemap" rel="dofollow">التصنيفات</a>
        <a href="https://www.toolrar.com/blog" rel="dofollow">المدونة</a>
        <a href="https://www.toolrar.com/pricing" rel="dofollow">الأسعار</a>
        <a href="https://www.toolrar.com/about" rel="dofollow">من نحن</a>
        <a href="https://www.toolrar.com/contact" rel="dofollow">تواصل معنا</a>
      </div>

      <!-- العمود الأيسر: أقسام الأدوات -->
      <div class="col">
        <div class="col-title">أقسام الأدوات</div>
        <a href="https://www.toolrar.com/text-tools/" rel="dofollow">أدوات النصوص والكلمات</a>
        <a href="https://www.toolrar.com/Developer/" rel="dofollow">أدوات المطورين</a>
        <a href="https://www.toolrar.com/Photo-Editing/" rel="dofollow">أدوات الصور والتصميم</a>
        <a href="https://www.toolrar.com/Calculators/" rel="dofollow">أدوات الحاسبة</a>
        <a href="https://www.toolrar.com/docs-tools/" rel="dofollow">أدوات PDF</a>
        <a href="https://www.toolrar.com/sitemap" rel="dofollow">خريطة الموقع</a>
        <a href="https://www.toolrar.com/privacy" rel="dofollow">سياسة الخصوصية</a>
      </div>

    </div>

    <div class="footer-line">
      © ToolRar - منصة أدوات الويب المجانية
    </div>

  </section>

  <script>
    // تأثير خفيف عند تحميل الصفحة: ظهور تدريجي للروابط
    document.addEventListener('DOMContentLoaded', function () {
      var links = document.querySelectorAll('.col a');
      links.forEach(function (el, i) {
        el.style.opacity = '0';
        el.style.transform = 'translateY(10px)';
        setTimeout(function () {
          el.style.transition = 'opacity 0.4s ease, transform 0.4s ease, background 0.25s ease, border-color 0.25s ease, color 0.25s ease';
          el.style.opacity = '1';
          el.style.transform = 'translateY(0)';
        }, 120 + i * 60);
      });
    });
  </script>
</body>
</html>
